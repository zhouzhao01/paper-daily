<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Daily</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PD</span>
        <div>
          <h1>Paper Daily</h1>
          <p id="updatedAt">正在读取数据</p>
        </div>
      </div>
      <nav class="top-actions" aria-label="仓库链接">
        <a class="icon-link" href="https://github.com/Futuresxy/paper-daily/issues" target="_blank" rel="noreferrer" title="配置研究方向">⚙</a>
        <a class="icon-link" href="https://github.com/Futuresxy/paper-daily/actions" target="_blank" rel="noreferrer" title="查看更新任务">↻</a>
      </nav>
    </header>

    <main class="shell">
      <section class="overview" aria-label="概览">
        <div class="overview-title">
          <p>Research Radar</p>
          <h2 id="viewTitle">最新论文</h2>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <span class="metric-value" id="paperCount">0</span>
            <span class="metric-label">总论文</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="weekCount">0</span>
            <span class="metric-label">本周新增</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="monthCount">0</span>
            <span class="metric-label">本月新增</span>
          </div>
          <div class="metric accent">
            <span class="metric-value" id="topScore">0.00</span>
            <span class="metric-label">最高匹配</span>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选">
        <div class="tabs" role="tablist" aria-label="视图">
          <button class="tab active" type="button" data-view="daily">当日</button>
          <button class="tab" type="button" data-view="week">本周</button>
          <button class="tab" type="button" data-view="month">本月</button>
          <button class="tab" type="button" data-view="highlights">本周精选</button>
        </div>
        <div class="filters">
          <label class="field compact">
            <span>日期</span>
            <select id="dateFilter"></select>
          </label>
          <label class="field">
            <span>方向</span>
            <select id="topicFilter"></select>
          </label>
          <label class="field">
            <span>匹配</span>
            <select id="levelFilter">
              <option value="all">全部</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label class="field search">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="标题、作者、关键词" />
          </label>
        </div>
      </section>

      <section class="content">
        <div class="content-head">
          <div>
            <h2 id="listTitle">当日论文</h2>
            <p id="scopeLabel">-</p>
          </div>
          <span id="resultCount">0 篇</span>
        </div>
        <div id="paperList" class="paper-list"></div>
      </section>
    </main>

    <template id="paperTemplate">
      <article class="paper-card">
        <div class="paper-main">
          <div class="paper-meta">
            <span class="match-badge"></span>
            <span class="paper-date"></span>
            <span class="paper-source"></span>
          </div>
          <h3 class="paper-title"></h3>
          <p class="paper-authors"></p>
          <div class="paper-tags"></div>
          <dl class="summary-grid">
            <div>
              <dt>问题</dt>
              <dd class="summary-problem"></dd>
            </div>
            <div>
              <dt>方法</dt>
              <dd class="summary-method"></dd>
            </div>
            <div>
              <dt>创新</dt>
              <dd class="summary-innovation"></dd>
            </div>
            <div>
              <dt>匹配</dt>
              <dd class="summary-relevant"></dd>
            </div>
          </dl>
        </div>
        <footer class="paper-footer">
          <span class="match-reason"></span>
          <div class="paper-links">
            <a class="paper-link abs-link" target="_blank" rel="noreferrer">原文</a>
            <a class="paper-link pdf-link" target="_blank" rel="noreferrer">PDF</a>
            <a class="paper-link download-link">下载 PDF</a>
          </div>
        </footer>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
