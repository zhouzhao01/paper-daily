name: Paper Daily

on:
  push:
    branches: [main]
  schedule:
    # Main daily run, off-peak odd minute (UTC).
    - cron: "23 1 * * *"
    # Catch-up run ~6h later; the pipeline is idempotent (library index dedupe
    # + per-day admission cap), so a double run is harmless.
    - cron: "41 7 * * *"
  workflow_dispatch:
    inputs:
      clear_cache:
        description: "是否清空顶会论文缓存后重新抓取"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore conference paper cache
        uses: actions/cache/restore@v4
        with:
          path: .paper-cache
          key: paper-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            paper-data-

      - name: Hydrate cached conference data
        run: |
          mkdir -p web/data
          if [ -f .paper-cache/papers.json ]; then
            cp .paper-cache/papers.json web/data/papers.json
          fi
          if [ -f .paper-cache/conference_papers.json ]; then
            cp .paper-cache/conference_papers.json web/data/conference_papers.json
          fi

      # The digest runs BEFORE conference collection: both hit the arXiv API
      # from the same runner IP, and the digest's five topic queries must not
      # start rate-limited by the collect step's abstract-enrichment lookups.
      - name: Run daily digest
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || secrets.LLM_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_CONCURRENCY: ${{ vars.LLM_CONCURRENCY || '2' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL || '' }}
          ARXIV_RETRY_THROTTLED: "true"
          # Optional overrides; when unset, values come from config/interests.json.
          MAX_LABOR_PAPER: ${{ vars.MAX_LABOR_PAPER || '' }}
          MAX_DAILY_ADDED: ${{ vars.MAX_DAILY_ADDED || '' }}
          MIN_SCORE: ${{ vars.MIN_SCORE || '' }}
          SHORTLIST_SIZE: ${{ vars.SHORTLIST_SIZE || '' }}
          DIGEST_ARXIV_DELAY_SECONDS: ${{ vars.DIGEST_ARXIV_DELAY_SECONDS || '6' }}
        run: python scripts/digest.py

      - name: Collect conference papers
        env:
          SKIP_DAILY_SOURCES: "true"
          MAX_SUMMARIES: "0"
          # Abstract enrichment is best-effort: fail fast instead of stalling
          # the run when a provider is down, cap the lookups (they resume the
          # next day), and query arXiv last to preserve its rate budget.
          ARXIV_RETRIES: "2"
          MAX_CONFERENCE_ABSTRACT_ENRICHMENTS: ${{ vars.MAX_CONFERENCE_ABSTRACT_ENRICHMENTS || '25' }}
          CONFERENCE_ABSTRACT_SOURCES: ${{ vars.CONFERENCE_ABSTRACT_SOURCES || 'openalex,crossref,arxiv' }}
          CONFERENCE_ABSTRACT_DELAY_SECONDS: ${{ vars.CONFERENCE_ABSTRACT_DELAY_SECONDS || '3' }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL || '' }}
          SOURCE_DELAY_SECONDS: ${{ vars.SOURCE_DELAY_SECONDS || '3' }}
          DBLP_DELAY_SECONDS: ${{ vars.DBLP_DELAY_SECONDS || '5' }}
          DBLP_PATTERN_DELAY_SECONDS: ${{ vars.DBLP_PATTERN_DELAY_SECONDS || '3' }}
          DBLP_RETRIES: ${{ vars.DBLP_RETRIES || '3' }}
          MAX_PER_CONFERENCE: ${{ vars.MAX_PER_CONFERENCE || '1000' }}
          MAX_NEW_CONFERENCE_PAPERS: ${{ vars.MAX_NEW_CONFERENCE_PAPERS || '50' }}
          MAX_STORED_CONFERENCE_PAPERS: ${{ vars.MAX_STORED_CONFERENCE_PAPERS || '300' }}
          CLEAR_PAPER_CACHE: ${{ github.event_name == 'workflow_dispatch' && inputs.clear_cache || 'false' }}
        run: python scripts/collect_papers.py

      - name: Commit library updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898270+github-actions[bot]@users.noreply.github.com"
          git add data web/data/library.json
          if git diff --cached --quiet; then
            echo "No library changes to commit."
          else
            git commit -m "Daily digest: $(date -u +%F) (run ${{ github.run_id }})"
            # --autostash: the conference-collect step leaves uncommitted edits
            # to tracked web/data files that we deploy but deliberately do not
            # commit; a plain rebase refuses to run with unstaged changes.
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Stage conference paper cache
        run: |
          mkdir -p .paper-cache
          cp web/data/papers.json .paper-cache/papers.json
          if [ -f web/data/conference_papers.json ]; then
            cp web/data/conference_papers.json .paper-cache/conference_papers.json
          fi

      - name: Save conference paper cache
        uses: actions/cache/save@v4
        with:
          path: .paper-cache
          key: paper-data-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
