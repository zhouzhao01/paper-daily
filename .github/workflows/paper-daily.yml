name: Paper Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    if: github.event_name != 'issues' || github.event.issue.title == 'Research Interests'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect papers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_ISSUE_TITLE: Research Interests
          LOOKBACK_DAYS: "7"
          MAX_PER_TOPIC: "25"
          MAX_SUMMARIES: "40"
          LLM_CONCURRENCY: "2"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || secrets.LLM_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/collect_papers.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
